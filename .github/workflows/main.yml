name: Android CI Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify/repair Gradle wrapper jar
        run: |
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ] || ! unzip -tq gradle/wrapper/gradle-wrapper.jar > /dev/null 2>&1; then
            echo "gradle-wrapper.jar is missing or corrupted, regenerating..."
            gradle wrapper --gradle-version 8.13
          else
            echo "gradle-wrapper.jar looks valid."
          fi

      - name: Run Lint
        run: ./gradlew lint --stacktrace

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
