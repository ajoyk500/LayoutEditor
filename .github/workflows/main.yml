name: Android CI Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure (debug)
        run: |
          echo "=== Top-level files/folders ==="
          ls -la
          echo ""
          echo "=== Full tree (depth 3) ==="
          find . -maxdepth 3 -not -path './.git*' | sort

      - name: Auto-extract project if zipped
        run: |
          if [ -d app ]; then
            echo "app/ already exists at root, no extraction needed."
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
          else
            ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
            if [ -z "$ZIP_FILE" ]; then
              echo "ERROR: app/ folder not found AND no .zip file found at repo root."
              echo "Repo contents:"
              ls -la
              exit 1
            fi
            echo "Found zip file: $ZIP_FILE"
            mkdir -p extracted
            unzip -q "$ZIP_FILE" -d extracted
            echo "=== Extracted contents ==="
            find extracted -maxdepth 3 | sort

            # The zip may contain a single top-level folder (e.g. LayoutEditor-master/)
            # or the project files directly. Detect which one and locate the real project root
            # (the directory that actually contains build.gradle / settings.gradle).
            PROJECT_DIR=$(find extracted -maxdepth 3 -name "settings.gradle" -exec dirname {} \; | head -n 1)
            if [ -z "$PROJECT_DIR" ]; then
              echo "ERROR: Could not locate settings.gradle inside the extracted zip."
              exit 1
            fi
            echo "Detected project directory: $PROJECT_DIR"
            echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        working-directory: ${{ env.PROJECT_DIR }}
        run: chmod +x gradlew

      - name: Verify/repair Gradle wrapper jar
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ] || ! unzip -tq gradle/wrapper/gradle-wrapper.jar > /dev/null 2>&1; then
            echo "gradle-wrapper.jar is missing or corrupted, regenerating..."
            gradle wrapper --gradle-version 8.13
          else
            echo "gradle-wrapper.jar looks valid."
          fi

      - name: Run Lint
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew lint --stacktrace

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: ${{ env.PROJECT_DIR }}/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Build debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
